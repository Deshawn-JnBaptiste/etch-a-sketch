<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Etch-a-sketch</h1>
    <div id="gridContainer">
    </div>
    <div>
        <div id="Options">
            <input type="color" name="colourPicker" id="colourPicker">
           <button id="colourButton">Colour Mode</button>
           <button id="rainbowButton">Rainbow Mode</button>
           <button id="eraserButton">Eraser</button>
           <button id="clearButton">Clear</button>
            <p id="gridLabel">Grid Size</p>
            <input type="range" name="gridSize" id="gridSize" min="1" max="100">
        </div>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
