<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Etch-a-sketch</h1>
    <div id="gridContainer">
    </div>
    <div>
        <div id="options">
            <div id="brushOptions">
                <input type="color" name="colourPicker" id="colourPicker">
                <button id="brushButton" class="buttonStyling">Brush Mode</button>
           </div>
           <div>
                <button id="rainbowButton" class="buttonStyling">Rainbow Mode</button>
                <button id="eraserButton" class="buttonStyling">Eraser</button>
                <button id="clearButton" class="buttonStyling">Clear</button>
           </div>
           <div id="gridSizeContainer">
                <p id="gridLabel"></p>
                <input type="range" name="gridSize" id="gridSize" min="1" max="100">
            </div>
        </div>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
